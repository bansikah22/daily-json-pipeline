# k8s-play/multi-pod-pvc/reader-pod.yml
apiVersion: v1
kind: Pod
metadata:
  name: multi-pvc-reader
spec:
  containers:
  - name: reader
    image: busybox
    # This command will wait for the file to appear before reading it.
    command: ["sh","-c","while [ ! -f /data/multi-pod-message.txt ]; do sleep 1; done; cat /data/multi-pod-message.txt && sleep 3600"]
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"
    volumeMounts:
    - name: shared-storage
      mountPath: /data
  volumes:
  - name: shared-storage
    persistentVolumeClaim:
      claimName: multi-pod-shared-pvc
