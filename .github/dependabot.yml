# This is a basic workflow to help you get started with Dependabot.
# For more information, see: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Enable version updates for Maven (Java producer)
  - package-ecosystem: "maven"
    directory: "/producer-java" # Location of pom.xml
    schedule:
      interval: "daily"

  # Enable version updates for pip (Python consumer)
  - package-ecosystem: "pip"
    directory: "/consumer-python" # Location of requirements.txt
    schedule:
      interval: "daily"
