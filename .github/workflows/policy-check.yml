# This workflow runs conftest to check Kubernetes manifests against Rego policies.
# It triggers on every pull request to ensure that no policy violations are merged.

name: "Policy Check"

on:
  pull_request:

jobs:
  conftest:
    name: "Run conftest"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v3

      - name: "Install conftest"
        run: |
          curl -L https://github.com/open-policy-agent/conftest/releases/download/v0.41.0/conftest_0.41.0_Linux_x86_64.tar.gz -o conftest.tar.gz
          tar xf conftest.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: "Run conftest against Kubernetes manifests"
        run: |
          conftest test k8s/*.yml --policy policy/
